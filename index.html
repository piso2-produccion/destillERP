<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#1a1a1a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Spirits ERP"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Piso 2 S.A. — ERP v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --mono:'DM Mono',monospace;
  --serif:'Playfair Display',serif;
  --amber:#e6950a;--amber-d:#c47d08;
  --amber-light:#fff8ee;--amber-border:#ffe0a0;
  --bg:#f4f3f0;--white:#fff;--border:#e8e4de;
  --text:#1a1a1a;--muted:#9c9690;--sub:#4a4540;
  --green:#3d7a54;--green-bg:#e6f4ec;
  --blue:#1e3a8a;--blue-bg:#e8f0fe;
  --red:#8a1e1e;--red-bg:#fdecea;
  --orange:#d97706;--orange-bg:#fff0d4;
  --sidebar:240px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#c9c4bc;border-radius:3px}
input,select,button,textarea{font-family:"DM Sans",sans-serif;outline:none}
button{cursor:pointer}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .22s ease forwards}

/* ── LAYOUT ── */
#app{display:flex;min-height:100vh;min-height:-webkit-fill-available}
#sidebar{width:var(--sidebar);background:var(--white);border-right:1px solid var(--border);position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:20;padding-top:var(--safe-t);transition:transform .25s ease}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:19;backdrop-filter:blur(2px)}
#main{margin-left:var(--sidebar);flex:1;padding:28px 32px;padding-bottom:calc(24px + var(--safe-b));min-height:100vh;background:var(--bg)}
#mobile-nav{display:none}

/* ── SIDEBAR ── */
.sidebar-logo{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-mark{width:38px;height:38px;background:var(--text);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:15px;font-weight:700;color:var(--amber);flex-shrink:0}
.logo-texts .logo-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.2}
.logo-texts small{font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
nav{flex:1;padding:8px;overflow-y:auto}
.nav-group{margin-bottom:4px}
.nav-group-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:8px 12px 4px}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 11px;border-radius:8px;margin-bottom:1px;border:1px solid transparent;color:var(--muted);font-size:12.5px;font-weight:400;background:transparent;text-align:left;transition:all .1s}
.nav-btn:hover{background:var(--amber-light);color:var(--text)}
.nav-btn.active{background:var(--amber-light);border-color:var(--amber-border);color:var(--text);font-weight:600}
.nav-icon{font-size:13px;width:16px;text-align:center;opacity:.55;flex-shrink:0}
.nav-btn.active .nav-icon{opacity:1}
.sidebar-footer{padding:10px 12px;border-top:1px solid var(--border);padding-bottom:calc(10px + var(--safe-b))}
.sidebar-user{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sidebar-email{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sidebar-role{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:2px 7px;border-radius:10px;background:var(--amber-light);color:var(--amber-d);flex-shrink:0}
.logout-btn{width:100%;background:none;border:1px solid var(--border);border-radius:8px;padding:6px;font-size:11px;color:var(--muted);transition:background .1s}
.logout-btn:hover{background:var(--bg)}

/* ── PANELS ── */
.panel{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.panel-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.panel-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.section-title{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.section-title h2{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:-.02em;color:var(--text)}
.section-title p{margin:3px 0 0;color:var(--muted);font-size:13px}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px}
.sc-icon{font-size:18px;margin-bottom:7px}
.sc-val{font-size:19px;font-weight:700;font-family:var(--mono);line-height:1;margin-bottom:2px}
.sc-lbl{font-size:11px;color:var(--muted)}

/* ── TABLES ── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#faf9f7}
th{text-align:left;padding:9px 12px;color:var(--muted);font-weight:600;font-size:10px;letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);background:var(--white);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#faf9f7}
td{padding:10px 12px;color:var(--sub);font-size:13px}

/* ── BADGES ── */
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mono);white-space:nowrap;display:inline-block}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-amber{background:var(--amber-light);color:var(--amber-d)}
.badge-gray{background:#f0ede8;color:var(--sub)}
.badge-orange{background:var(--orange-bg);color:var(--orange)}

/* ── BUTTONS ── */
.btn{border:none;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:600;transition:all .12s;white-space:nowrap;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.btn:active{transform:scale(.97)}
.btn-sm{border:none;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .1s;display:inline-flex;align-items:center;gap:4px}
.btn-sm:active{transform:scale(.95)}
.btn-primary{background:var(--amber);color:#fff}
.btn-primary:hover{background:var(--amber-d)}
.btn-blue{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:#dc2626;color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--sub)}
.btn-outline:hover{border-color:var(--muted)}
.btn-outline-blue{background:transparent;border:1.5px solid var(--blue);color:var(--blue)}
.btn-outline-red{background:transparent;border:1.5px solid var(--red);color:var(--red)}
.btn-ghost{background:transparent;border:none;color:var(--muted);padding:4px 8px}
.btn-ghost:hover{color:var(--text)}

/* ── FORMS ── */
.input-group{margin-bottom:12px}
.input-group label{display:block;font-size:10px;color:var(--sub);font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.input-group input,.input-group select,.input-group textarea{width:100%;background:var(--white);border:1.5px solid #d4cfc8;border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;transition:border-color .12s}
.input-group input:focus,.input-group select:focus,.input-group textarea:focus{border-color:var(--amber)}
.input-group textarea{resize:vertical;min-height:80px}
.input-row{display:grid;gap:0 12px}
.input-row-2{grid-template-columns:1fr 1fr}
.input-row-3{grid-template-columns:1fr 1fr 1fr}
.input-hint{font-size:11px;color:var(--muted);margin-top:4px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(26,26,26,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0;backdrop-filter:blur(3px)}
.modal-box{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:760px;padding:24px 22px calc(24px + var(--safe-b));box-shadow:0 -8px 40px rgba(0,0,0,.15);max-height:92vh;overflow-y:auto;animation:slideUp .22s ease}
@media(min-width:640px){.modal-overlay{align-items:center;padding:20px}.modal-box{border-radius:18px;padding:28px;max-height:90vh}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-header h3{font-family:var(--serif);font-size:18px;font-weight:700}
.modal-close{background:#f0ede8;border:none;color:var(--sub);width:28px;height:28px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.modal-tabs{display:flex;gap:2px;background:#f4f3f0;border-radius:10px;padding:3px;margin-bottom:20px}
.modal-tab{flex:1;padding:7px;border:none;background:transparent;border-radius:8px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .12s}
.modal-tab.active{background:var(--white);color:var(--text);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* ── RECIPE BUILDER ── */
.recipe-line{display:flex;align-items:center;gap:8px;padding:8px;background:#faf9f7;border-radius:8px;margin-bottom:6px;border:1px solid var(--border)}
.recipe-line select,.recipe-line input{flex:1;background:var(--white);border:1px solid #d4cfc8;border-radius:7px;padding:6px 9px;font-size:12px;color:var(--text)}
.recipe-line .unit-label{font-size:11px;color:var(--muted);font-family:var(--mono);white-space:nowrap;min-width:30px}
.recipe-remove{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0}
.recipe-remove:hover{color:var(--red)}

/* ── STOCK INDICATOR ── */
.stock-bar{background:#f0ede8;border-radius:4px;height:5px;overflow:hidden;margin-top:5px}
.stock-bar-fill{height:100%;border-radius:4px;transition:width .3s}
.stock-low{background:var(--red)}
.stock-mid{background:var(--orange)}
.stock-ok{background:var(--green)}

/* ── MISC ── */
.timer-val{color:var(--green);font-weight:700;font-size:13px;font-family:var(--mono)}
.timer-ts{color:var(--muted);font-size:10px;font-family:var(--mono)}
.timer-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1s infinite;display:inline-block}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--mono);flex-shrink:0}
.spinner{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
#save-indicator{position:fixed;bottom:calc(18px + var(--safe-b));right:18px;background:var(--text);color:#fff;padding:7px 13px;border-radius:20px;font-size:12px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;display:flex;align-items:center;gap:7px}
#save-indicator.show{opacity:1}
#save-indicator.error{background:#8a1e1e}
.empty-state{padding:48px 20px;text-align:center;color:var(--muted)}
.empty-state .empty-icon{font-size:32px;margin-bottom:10px}
.empty-state p{font-size:13px}
.alert-low{background:var(--red-bg);border:1px solid #f5c6c6;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--red);margin-bottom:8px}
.info-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.info-chip{background:#f4f3f0;border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--sub)}
.info-chip strong{color:var(--text)}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}

/* ── LOGIN ── */
#login-screen{min-height:100vh;min-height:-webkit-fill-available;background:linear-gradient(145deg,#1a1a16 0%,#2c2820 50%,#1a1a16 100%);display:flex;align-items:center;justify-content:center;padding:20px;padding-top:calc(20px + var(--safe-t));padding-bottom:calc(20px + var(--safe-b))}
.login-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:11px 14px;color:#fff;font-size:13px;transition:border-color .15s}
.login-input:focus{border-color:rgba(230,149,10,.6);outline:none}
.login-btn{width:100%;background:var(--amber);border:none;border-radius:10px;padding:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s;letter-spacing:.02em}
.login-btn:active{opacity:.85}

/* ── MENU BTN ── */
#menu-btn{display:none;position:fixed;top:calc(12px + var(--safe-t));left:14px;z-index:21;background:var(--white);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.hamburger{display:flex;flex-direction:column;gap:3px}
.hamburger span{width:15px;height:2px;background:var(--text);border-radius:2px;display:block}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.show{display:block}
  #main{margin-left:0;padding:14px 13px 82px;padding-top:calc(58px + var(--safe-t))}
  .stat-grid{grid-template-columns:repeat(2,1fr);gap:9px}
  #mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:6px 0 calc(6px + var(--safe-b));z-index:18;box-shadow:0 -3px 16px rgba(0,0,0,.06)}
  .mob-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--muted);font-size:9px;font-weight:500;padding:4px 2px;transition:color .1s}
  .mob-nav-btn.active{color:var(--amber)}
  .mob-icon{font-size:18px;line-height:1}
  .input-row-2,.input-row-3{grid-template-columns:1fr}
  .section-title{flex-direction:column;align-items:flex-start}
  .section-title .btn{width:100%;justify-content:center}
  #save-indicator{bottom:calc(78px + var(--safe-b))}
  #menu-btn{display:flex}
}
@media(max-width:480px){
  .stat-card{padding:11px}
  .sc-val{font-size:17px}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="save-indicator"><span class="spinner" id="si-spin" style="display:none"></span><span id="si-text">Guardado</span></div>
<div id="sidebar-overlay" onclick="closeSidebar()"></div>
<button id="menu-btn" onclick="toggleSidebar()" aria-label="Menú"><div class="hamburger"><span></span><span></span><span></span></div></button>

<script>
'use strict';
var DB = 'spirits_erp_v3';
var activeTimers = {};

// ── DEFAULT DATA ──────────────────────────────────────────────────────────────
var DEFAULTS = {
  operarios:[],tanques:[],lotes:[],controles:[],ventas:[],producciones:[],
  productos:[],recetas:{},insumos:[],proveedores:[],clientes:[],
  unidades:[
    {id:'u1',nombre:'Litros',abrev:'L',tipo:'volumen'},
    {id:'u2',nombre:'Kilogramos',abrev:'kg',tipo:'peso'},
    {id:'u3',nombre:'Gramos',abrev:'g',tipo:'peso'},
    {id:'u4',nombre:'Mililitros',abrev:'ml',tipo:'volumen'},
    {id:'u5',nombre:'Unidades',abrev:'un',tipo:'cantidad'},
    {id:'u6',nombre:'Cajas',abrev:'cj',tipo:'cantidad'},
  ],
  usuarios:[{id:'u1',nombre:'Administrador',email:'admin@piso2.com',rol:'admin',activo:true}],
  config:{empresa:'Piso 2 S.A.',sector:'Industria de Bebidas',stockAlertaPct:20,notifTimers:true,backupAuto:true}
};

// ── STATE ─────────────────────────────────────────────────────────────────────
var S = {
  user:null,userObj:null,loaded:false,
  section:'dashboard',modal:null,
  modalTab:0,
  editId:null,viewId:null,
  recipeLines:[],
  filter:{},
  data: JSON.parse(JSON.stringify(DEFAULTS))
};

// ── PERSISTENCE ───────────────────────────────────────────────────────────────
function save(){
  try{localStorage.setItem(DB,JSON.stringify(S.data));showSaved('Guardado ✓');}
  catch(e){showSaved('Error al guardar','error');}
}
function load(){
  try{
    var r=localStorage.getItem(DB);
    if(r){
      var d=JSON.parse(r);
      Object.keys(DEFAULTS).forEach(function(k){
        if(d[k]!==undefined)S.data[k]=d[k];
      });
      // ensure defaults for new keys
      if(!S.data.unidades||!S.data.unidades.length)S.data.unidades=DEFAULTS.unidades;
      if(!S.data.usuarios||!S.data.usuarios.length)S.data.usuarios=DEFAULTS.usuarios;
    }
  }catch(e){}
  S.loaded=true;render();
}
function showSaved(msg,type){
  var el=document.getElementById('save-indicator');if(!el)return;
  document.getElementById('si-text').textContent=msg;
  el.className='show'+(type?' '+type:'');
  setTimeout(function(){el.className='';},1800);
}
function exportBackup(){
  var blob=new Blob([JSON.stringify({version:3,date:new Date().toISOString(),data:S.data},null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='spirits-erp-'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
function importBackup(file){
  var r=new FileReader();
  r.onload=function(e){
    try{
      var p=JSON.parse(e.target.result);
      var d=p.data||p;
      Object.keys(DEFAULTS).forEach(function(k){if(d[k]!==undefined)S.data[k]=d[k];});
      save();render();alert('Backup importado OK');
    }catch(e){alert('Archivo inválido');}
  };r.readAsText(file);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function num(n,dec){var x=Number(n||0);return dec?x.toFixed(dec):x.toLocaleString('es-AR');}
function now(){return new Date().toISOString().replace('T',' ').slice(0,19);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmtElapsed(s){var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return(h?h+'h ':'')+( m?m+'m ':'')+sec+'s';}
function gv(id){var el=document.getElementById(id);return el?el.value:'';}
function gvn(id){return Number(gv(id))||0;}

var SECTOR_C={Destilería:'#e6950a',Manipulación:'#1e3a8a',Reposo:'#3d7a54'};
function badge(s,cl){
  var map={
    'Pendiente':'badge-amber','En proceso':'badge-orange','Completado':'badge-green',
    'Aprobado':'badge-green','Rechazado':'badge-red','Despachado':'badge-blue',
    'Recepción':'badge-gray','Envasado':'badge-blue','Activo':'badge-green',
    'Inactivo':'badge-gray','admin':'badge-amber','operario':'badge-blue','supervisor':'badge-green',
  };
  return'<span class="badge '+(cl||map[s]||'badge-gray')+'">'+esc(s)+'</span>';
}
function avatar(name,color,size){
  var i=(name||'?').split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase();
  return'<div class="avatar" style="width:'+size+'px;height:'+size+'px;background:'+color+'22;color:'+color+';font-size:'+(size*.34)+'px">'+i+'</div>';
}
function timerCell(inicio,fin){
  if(!inicio)return'<span style="color:var(--muted);font-size:12px">—</span>';
  if(fin)return'<div><span class="timer-val">✓</span><div class="timer-ts">'+esc(fin.slice(0,10))+'</div></div>';
  var s=Math.floor((Date.now()-new Date(inicio.replace(' ','T')).getTime())/1000);
  var tid='t'+inicio.replace(/[^0-9]/g,'');
  return'<div style="display:flex;align-items:center;gap:5px"><span class="timer-dot"></span><span class="timer-val" id="'+tid+'">'+fmtElapsed(s)+'</span></div><div class="timer-ts">'+esc(inicio.slice(0,16))+'</div>';
}
function stitle(t,sub,act){

// ── STOCK HELPERS ─────────────────────────────────────────────────────────────
function stockPct(insumo){
  if(!insumo.stockMax||!insumo.stockActual)return 0;
  return Math.min(100,Math.round((Number(insumo.stockActual)/Number(insumo.stockMax))*100));
}
function stockClass(pct){return pct<=20?'stock-low':pct<=50?'stock-mid':'stock-ok';}
function stockBadge(insumo){
  var pct=stockPct(insumo);
  var alertPct=S.data.config.stockAlertaPct||20;
  if(pct<=alertPct)return badge('Stock bajo','badge-red');
  if(pct<=50)return badge('Stock medio','badge-orange');
  return badge('Stock OK','badge-green');
}
function descontarStock(productoId,cantidad){
  var r=S.data.recetas[productoId];
  if(!r||!r.length)return;
  r.forEach(function(line){
    var ins=S.data.insumos.find(function(x){return x.id===line.insumoId;});
    if(ins){
      var consume=Number(line.cantidad)*Number(cantidad);
      ins.stockActual=Math.max(0,(Number(ins.stockActual)||0)-consume);
    }
  });
}
function puedeProducir(productoId,cantidad){
  var r=S.data.recetas[productoId];
  if(!r||!r.length)return{ok:true,faltantes:[]};
  var faltantes=[];
  r.forEach(function(line){
    var ins=S.data.insumos.find(function(x){return x.id===line.insumoId;});
    var necesita=Number(line.cantidad)*Number(cantidad);
    if(!ins||Number(ins.stockActual)<necesita){
      faltantes.push({nombre:ins?ins.nombre:line.insumoId,necesita:necesita,tiene:ins?Number(ins.stockActual):0,abrev:getUnidadAbrev(line.unidadId)});
    }
  });
  return{ok:faltantes.length===0,faltantes:faltantes};
}

function rTrazabilidad(){
  var STAGES=['recepcion','tanque','destilacion','filtracion','mezcla','reposo','envasado'];
  var STAGE_L=['Recepción','Tanques','Destilación','Filtración','Mezclas','Reposo','Envasado'];
  return stitle('Trazabilidad','Seguimiento de lotes','<button class="btn btn-primary" onclick="openModal(\'newLote\')">+ Nuevo lote</button>')+
    (S.data.lotes.length?S.data.lotes.map(function(l){
      var checks=l.checkpoints||['recepcion'];var cur=STAGES.indexOf(checks[checks.length-1]);
      return'<div class="panel" style="margin-bottom:10px"><div style="padding:13px 15px">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'+
        '<div><span style="font-family:var(--mono);font-size:11px;color:var(--amber);font-weight:700">'+esc(l.id)+'</span>'+
        '<div style="font-size:13px;font-weight:600;margin-top:1px">'+esc(l.producto)+'</div>'+
        '<div style="font-size:11px;color:var(--muted);margin-top:1px">'+num(l.volumen)+' L · '+l.graduacion+'° · '+esc(l.fecha)+'</div></div>'+
        badge(l.estado)+'</div>'+
        '<div style="display:flex;align-items:center;overflow-x:auto;padding-bottom:3px">'+
        STAGES.map(function(s,i){
          var done=checks.indexOf(s)>=0,isCur=i===cur;
          var bg=done?'#e6950a':isCur?'#fff8ee':'#f4f3f0';
          var c=done?'#fff':isCur?'#e6950a':'#9c9690';
          var bc=done?'#e6950a':isCur?'#e6950a':'#e8e4de';
          return'<div style="display:flex;align-items:center;flex-shrink:0">'+
            '<div style="background:'+bg+';border:2px solid '+bc+';color:'+c+';border-radius:7px;padding:3px 7px;font-size:10px;font-weight:600;cursor:'+(i===cur+1?'pointer':'default')+'"'+
            (i===cur+1?' onclick="advanceLote(\''+l.id+'\',\''+s+'\')"':'')+'>'+STAGE_L[i]+'</div>'+
            (i<STAGES.length-1?'<div style="width:10px;height:1px;background:var(--border)"></div>':'');
        }).join('')+'</div></div></div>';
    }).join(''):
    '<div class="panel">'+emptyState('⊙','Sin lotes.')+'</div>');
}
function advanceLote(id,stage){
  var l=S.data.lotes.find(function(x){return x.id===id;});
  if(l){
    var STAGES=['recepcion','tanque','destilacion','filtracion','mezcla','reposo','envasado'];
    var STAGES_L=['Recepción','Tanques','Destilación','Filtración','Mezclas','Reposo','Envasado'];
    l.checkpoints=l.checkpoints||['recepcion'];
    if(l.checkpoints.indexOf(stage)<0)l.checkpoints.push(stage);
    var idx=STAGES.indexOf(stage);l.estado=idx>=0?STAGES_L[idx]:'Activo';
    save();render();
  }
}

// ── SUBMIT HANDLERS ───────────────────────────────────────────────────────────
function submitOp(idx){
  var nombre=gv('opnombre').trim();if(!nombre)return;
  var op={id:idx>=0?S.data.operarios[idx].id:uid(),nombre:nombre,cargo:gv('opcargo'),dni:gv('opdni'),telefono:gv('optel'),email:gv('opemail'),domicilio:gv('opdomicilio')};
  if(idx>=0)S.data.operarios[idx]=op;else S.data.operarios.push(op);
  save();closeModal();
}
function submitProducto(idx){
  var nombre=gv('pnombre').trim();if(!nombre)return;
  var p={id:idx>=0?S.data.productos[idx].id:uid(),nombre:nombre,categoria:gv('pcategoria'),graduacion:gvn('pgrad'),formato:gv('pformato'),precioVenta:gvn('pprecio'),descripcion:gv('pdesc'),activo:true};
  if(idx>=0)S.data.productos[idx]=p;else S.data.productos.push(p);
  save();closeModal();
}
function submitInsumo(idx){
  var nombre=gv('inombre').trim();if(!nombre)return;
  var ins={id:idx>=0?S.data.insumos[idx].id:uid(),nombre:nombre,categoria:gv('icat'),stockActual:gvn('istockact'),stockMin:gvn('istockmin'),stockMax:gvn('istockmax'),unidadId:gv('iunidad')||'u1',costoUnit:gvn('icosto'),proveedorId:gv('iproveedor'),notas:gv('inotas')};
  if(idx>=0)S.data.insumos[idx]=ins;else S.data.insumos.push(ins);
  save();closeModal();
}
function submitAjusteStock(){
  var ins=S.data.insumos[S.editId];if(!ins)return;
  var tipo=gv('ajuste_tipo'),cant=gvn('ajuste_cant');if(!cant)return;
  if(tipo==='entrada')ins.stockActual=(Number(ins.stockActual)||0)+cant;
  else if(tipo==='salida')ins.stockActual=Math.max(0,(Number(ins.stockActual)||0)-cant);
  else ins.stockActual=cant;
  save();closeModal();
}
function submitProveedor(idx){
  var nombre=gv('pvnombre').trim();if(!nombre)return;
  var pv={id:idx>=0?S.data.proveedores[idx].id:uid(),nombre:nombre,rubro:gv('pvrubro'),contacto:gv('pvcontacto'),telefono:gv('pvtel'),email:gv('pvemail'),cuit:gv('pvcuit'),direccion:gv('pvdir'),notas:gv('pvnotas')};
  if(idx>=0)S.data.proveedores[idx]=pv;else S.data.proveedores.push(pv);
  save();closeModal();
}
function submitCliente(idx){
  var nombre=gv('clnombre').trim();if(!nombre)return;
  var cl={id:idx>=0?S.data.clientes[idx].id:uid(),nombre:nombre,tipo:gv('cltipo'),contacto:gv('clcontacto'),telefono:gv('cltel'),email:gv('clemail'),cuit:gv('clcuit'),direccion:gv('cldir'),listaPrecio:gv('cllista')};
  if(idx>=0)S.data.clientes[idx]=cl;else S.data.clientes.push(cl);
  save();closeModal();
}
function submitUsuario(idx){
  var email=gv('uemail').trim();if(!email)return;
  var u={id:idx>=0?S.data.usuarios[idx].id:uid(),nombre:gv('unombre'),email:email,rol:gv('urol')||'operario',activo:gv('uactivo')==='1'};
  if(idx>=0)S.data.usuarios[idx]=u;else S.data.usuarios.push(u);
  save();closeModal();
}
function submitUnidad(){
  var nombre=gv('unombre2').trim(),abrev=gv('uabrev').trim();if(!nombre||!abrev)return;
  S.data.unidades.push({id:uid(),nombre:nombre,abrev:abrev,tipo:gv('utipo')||'otro'});
  save();closeModal();
}
function submitTank(){
  var id=gv('tkid').trim();if(!id)return;
  S.data.tanques.push({id:id,sector:gv('tksec')||'Destilería',contenido:gv('tkcont'),capacidad:gvn('tkcap'),litros:gvn('tklitros')});
  save();closeModal();
}
function submitProd(){
  var op=gv('mop'),tipo=gv('mtipo'),orig=gv('morig');if(!op||!tipo)return;
  var p={id:'OP-'+(100+S.data.producciones.length+1),tipo:tipo,origen:orig,destino:gv('mdest'),gIn:gv('mgin'),gOut:gv('mgout'),litros:gvn('mlit'),estado:'Pendiente',fecha:new Date().toISOString().slice(0,10),operario:op,inicio:null,fin:null};
  S.data.producciones.unshift(p);save();closeModal();
}
function submitControl(){
  var resp=gv('mresp'),lote=gv('mlote'),punto=gv('mpunto');if(!resp||!lote||!punto)return;
  var grad=gvn('mgrad'),meta=gv('mmeta'),aprobado=grad>0&&meta==='ND';
  var c={id:'QC-'+(100+S.data.controles.length+1),lote:lote,punto:punto,responsable:resp,graduacion:grad,turbidez:gv('mturb'),metanol:meta,aprobado:aprobado,fecha:new Date().toISOString().slice(0,10),inicio:null,fin:null};
  S.data.controles.unshift(c);save();closeModal();
}
function submitLote(){
  var prod=gv('mprod'),vol=gv('mvol');if(!prod||!vol)return;
  var prodObj=S.data.productos.find(function(p){return p.id===prod;});
  var l={id:'LOT-'+new Date().getFullYear()+'-'+(100+S.data.lotes.length+1),producto:prodObj?prodObj.nombre:prod,productoId:prod,volumen:gvn('mvol'),graduacion:gvn('mgrad2'),origen:gv('morig2'),estado:'Recepción',fecha:new Date().toISOString().slice(0,10),checkpoints:['recepcion']};
  // descuento de stock automático
  if(prod)descontarStock(prod,gvn('mvol'));
  S.data.lotes.unshift(l);save();closeModal();
}
function submitVenta(){
  var cli=gv('mcli'),vprod=gv('mvprod'),cant=gv('mcant');if(!cli||!vprod||!cant)return;
  var v={id:'VTA-'+(100+S.data.ventas.length+1).toString().padStart(3,'0'),cliente:cli,producto:vprod,cantidad:gvn('mcant'),precio:gvn('mprec'),fecha:new Date().toISOString().slice(0,10),estado:'Pendiente'};
  S.data.ventas.unshift(v);save();closeModal();
}

// ── RECETA SELECT HANDLER ─────────────────────────────────────────────────────
document.addEventListener('change',function(e){
  if(e.target&&e.target.id==='rec_prod'){
    S.editId=e.target.value||null;render();
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
