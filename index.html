<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#1a1a1a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Spirits ERP"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Piso 2 S.A. — Sistema ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --mono:'DM Mono',monospace;--serif:'Barlow Condensed','Arial Narrow','Helvetica Neue',Arial,sans-serif;
  --amber:#F5A623;--amber-light:#FFF8EC;--amber-border:#FFD980;
  --bg:#F7F7F7;--white:#FFFFFF;--border:#E5E5E5;--text:#2B2B2B;
  --muted:#9A9A9A;--sub:#555555;--green:#2E7D52;--blue:#1A3A6B;--red:#C0392B;
  --sidebar:245px;--safe-bottom:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:"Barlow","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#c9c4bc;border-radius:3px}
input,select,button,textarea{font-family:"Barlow","Helvetica Neue",Arial,sans-serif;outline:none}button{cursor:pointer}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes wave{from{transform:translateX(0)}to{transform:translateX(50%)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .25s ease forwards}
#app{display:flex;min-height:100vh}
#sidebar{width:var(--sidebar);background:#2B2B2B;border-right:none;position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:20;padding-top:var(--safe-top);transition:transform .25s ease}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:19;backdrop-filter:blur(2px)}
#main{margin-left:var(--sidebar);flex:1;padding:28px 32px;padding-bottom:calc(20px + var(--safe-bottom));min-height:100vh;background:var(--bg)}
#mobile-nav{display:none}
.sidebar-logo{padding:16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:3px;background:#2B2B2B}
.sidebar-logo small{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.12em;text-transform:uppercase}
nav{flex:1;padding:8px;overflow-y:auto;background:#2B2B2B}

.nav-section{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.12em;padding:10px 10px 4px}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border-radius:8px;margin-bottom:1px;border:1px solid transparent;color:rgba(255,255,255,.55);font-size:13px;font-weight:400;background:transparent;text-align:left;transition:all .12s}
.nav-btn:hover{background:rgba(245,166,35,.15);color:rgba(255,255,255,.9)}
.nav-btn.active{background:rgba(245,166,35,.2);border-color:rgba(245,166,35,.4);color:#fff;font-weight:600}
.nav-icon{font-size:13px;width:17px;text-align:center;opacity:.55;flex-shrink:0}
.nav-btn.active .nav-icon{opacity:1}
.sidebar-footer{padding:10px 12px;border-top:1px solid rgba(255,255,255,.1);padding-bottom:calc(10px + var(--safe-bottom));background:#2B2B2B}
.sidebar-email{font-size:11px;color:rgba(255,255,255,.4);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:7px}
.logout-btn{width:100%;background:none;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:7px;font-size:11px;color:rgba(255,255,255,.4);transition:background .12s}
.logout-btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7)}
.section-title{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.section-title h2{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;letter-spacing:-.01em;color:var(--text);line-height:1;text-transform:uppercase}
.section-title p{margin:4px 0 0;color:var(--muted);font-size:13px}
.panel{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.panel-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.panel-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px 14px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.stat-card .sc-icon{font-size:18px;margin-bottom:7px}
.stat-card .sc-val{font-size:19px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1;margin-bottom:3px}
.stat-card .sc-lbl{font-size:11px;color:var(--muted)}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#faf9f7}
th{text-align:left;padding:9px 12px;color:var(--muted);font-weight:600;font-size:10px;letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);background:var(--white);transition:background .1s}
tbody tr:hover{background:#faf9f7}
td{padding:9px 12px;color:var(--sub);font-size:13px}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mono);white-space:nowrap}
.btn{border:none;border-radius:9px;padding:9px 18px;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(.97)}
.btn-sm{border:none;border-radius:7px;padding:5px 11px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .12s}
.btn-sm:active{transform:scale(.95)}
.btn-primary{background:var(--amber);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-outline-blue{background:transparent;color:var(--blue);border:1.5px solid var(--blue)}
.btn-outline-red{background:transparent;color:var(--red);border:1.5px solid var(--red)}
.btn-outline-muted{background:transparent;color:var(--muted);border:1.5px solid var(--muted)}
.btn:hover{opacity:.85}
.input-group{margin-bottom:13px}
.input-group label{display:block;font-size:11px;color:var(--sub);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.input-group input,.input-group select,.input-group textarea{width:100%;background:var(--white);border:1.5px solid #d4cfc8;border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;transition:border-color .15s}
.input-group input:focus,.input-group select:focus,.input-group textarea:focus{border-color:var(--amber)}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px}
.modal-overlay{position:fixed;inset:0;background:rgba(26,26,26,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0;backdrop-filter:blur(3px)}
.modal-box{background:var(--white);border-radius:16px 16px 0 0;width:100%;max-width:720px;padding:24px 24px calc(24px + var(--safe-bottom));box-shadow:0 -8px 40px rgba(0,0,0,.15);max-height:92vh;overflow-y:auto;animation:slideUp .25s ease}
@media(min-width:600px){.modal-overlay{align-items:center;padding:20px}.modal-box{border-radius:12px;padding:28px;max-height:88vh}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-header h3{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.02em}
.modal-close{background:#f0ede8;border:none;color:var(--sub);width:30px;height:30px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
#login-screen{min-height:100vh;background:linear-gradient(145deg,#1a1a16 0%,#2c2820 50%,#1a1a16 100%);display:flex;align-items:center;justify-content:center;padding:20px;padding-top:calc(20px + var(--safe-top));padding-bottom:calc(20px + var(--safe-bottom))}
.login-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;color:#fff;font-size:14px;transition:border-color .15s}
.login-input:focus{border-color:rgba(230,149,10,.6);outline:none}
.login-btn{width:100%;background:var(--amber);border:none;border-radius:10px;padding:13px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.login-btn:active{opacity:.85}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:130px;padding:4px 0}
.chart-bar-col{display:flex;flex-direction:column;align-items:center;flex:1;height:100%}
.chart-bar-inner{width:100%;display:flex;flex-direction:column;justify-content:flex-end;height:calc(100% - 20px)}
.chart-bar{width:100%;border-radius:4px 4px 0 0;min-height:2px}
.chart-label{font-size:9px;color:var(--muted);margin-top:4px;font-family:var(--mono);text-align:center}
.timer-val{color:var(--green);font-weight:700;font-size:13px;font-family:var(--mono)}
.timer-ts{color:var(--muted);font-size:10px;font-family:var(--mono)}
.timer-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1s infinite;display:inline-block}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--mono);flex-shrink:0}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
#save-indicator{position:fixed;bottom:calc(20px + var(--safe-bottom));right:20px;background:var(--text);color:#fff;padding:8px 14px;border-radius:20px;font-size:12px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;display:flex;align-items:center;gap:8px}
#save-indicator.show{opacity:1}
#save-indicator.error{background:var(--red)}
.stock-bar{height:6px;border-radius:4px;background:var(--bg);border:1px solid var(--border);overflow:hidden;margin-top:4px}
.stock-bar-fill{height:100%;border-radius:4px;transition:width .3s}
.recipe-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.recipe-row:last-child{border-bottom:none}
.tag{display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:500;color:var(--sub)}
.alert-low{background:#fff8ee;border:1px solid var(--amber-border);border-radius:10px;padding:10px 14px;font-size:12px;color:#8a5a1e;display:flex;align-items:center;gap:8px}

.img-upload-zone{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border-color .15s;position:relative;overflow:hidden}
.img-upload-zone:hover{border-color:var(--amber)}
.img-upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-upload-zone img{width:100%;height:120px;object-fit:cover;border-radius:8px;display:block}
.img-avatar{width:100%;height:100%;object-fit:cover;border-radius:inherit}
.tank-visual{position:relative;width:56px;height:100px;flex-shrink:0}
.tank-body{width:100%;height:80px;background:#f0ede8;border:2px solid var(--border);border-radius:6px 6px 10px 10px;overflow:hidden;position:relative}
.tank-fill{position:absolute;bottom:0;left:0;right:0;border-radius:0 0 8px 8px;transition:height .6s ease}
.tank-top{width:70%;height:8px;background:#d4cfc8;border-radius:4px 4px 0 0;margin:0 auto;border:2px solid var(--border);border-bottom:none}
.tank-pct{text-align:center;font-family:var(--mono);font-size:10px;font-weight:700;margin-top:3px}
.tank-img-thumb{width:56px;height:56px;border-radius:8px;object-fit:cover;border:2px solid var(--border)}
.config-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.config-card-header{padding:12px 16px;background:#faf9f7;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.config-card-body{padding:16px}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#d4cfc8;border-radius:24px;cursor:pointer;transition:.2s}
.toggle-slider:before{content:"";position:absolute;width:20px;height:20px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked + .toggle-slider{background:var(--amber)}
.toggle input:checked + .toggle-slider:before{transform:translateX(20px)}
.perm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.perm-item{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;cursor:pointer;transition:all .12s;text-align:center}
.perm-item.on{background:var(--amber-light);border-color:var(--amber-border);color:#8a5a1e;font-weight:600}
#menu-btn{display:none;position:fixed;top:calc(12px + var(--safe-top));left:14px;z-index:21;background:#2B2B2B;border:1px solid rgba(255,255,255,.15);border-radius:10px;width:38px;height:38px;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2)}
@media(max-width:768px){
  #menu-btn{display:flex}
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.show{display:block}
  #main{margin-left:0;padding:16px 14px 80px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  #mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#2B2B2B;border-top:1px solid rgba(255,255,255,.1);padding:8px 0 calc(8px + var(--safe-bottom));z-index:18;box-shadow:0 -4px 20px rgba(0,0,0,.2)}
  .mob-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-size:9px;font-weight:500;padding:4px 2px;transition:color .12s}
  .mob-nav-btn.active{color:var(--amber)}
  .mob-icon{font-size:20px;line-height:1}
  .form-grid-2,.form-grid-3{grid-template-columns:1fr}
  .section-title{flex-direction:column;align-items:flex-start}
  .section-actions .btn{width:100%;justify-content:center}
  #save-indicator{bottom:calc(80px + var(--safe-bottom))}
  .perm-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){
  .stat-grid{gap:8px}
  .stat-card{padding:12px}
  .stat-card .sc-val{font-size:16px}
  table{font-size:12px}
  td,th{padding:7px 9px}
}
.hamburger{display:flex;flex-direction:column;gap:4px}
.hamburger span{width:16px;height:2px;background:rgba(255,255,255,.8);border-radius:2px;display:block}
</style>
</head>

// ── IMAGE HELPERS ──────────────────────────────────────────────────────────────
function getImg(tipo,id){return S.imagenes[tipo+'_'+id]||'';}
function setImg(tipo,id,dataUrl){S.imagenes[tipo+'_'+id]=dataUrl;save();}
function delImg(tipo,id){delete S.imagenes[tipo+'_'+id];save();}
function imgUpload(tipo,id,input){
  var file=input.files[0];if(!file)return;
  if(file.size>2*1024*1024){alert('La imagen no puede superar 2MB. Reducí el tamaño antes de subir.');return;}
  var r=new FileReader();
  r.onload=function(e){setImg(tipo,id,e.target.result);render();};
  r.readAsDataURL(file);
}
function imgThumb(tipo,id,w,h,radius){
  var url=getImg(tipo,id);
  w=w||40;h=h||40;radius=radius||'50%';
  if(url)return'<img src="'+url+'" style="width:'+w+'px;height:'+h+'px;border-radius:'+radius+';object-fit:cover;border:2px solid var(--border);flex-shrink:0"/>';
  return'<div style="width:'+w+'px;height:'+h+'px;border-radius:'+radius+';background:var(--amber);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:'+(w*.3)+'px;color:#fff;flex-shrink:0;border:2px solid var(--border)">?</div>';
}

// ── PERSIST ───────────────────────────────────────────────────────────────────
var FIELDS=['operarios','tanques','lotes','controles','ventas','producciones',
            'productos','recetas','insumos','movimientos','proveedores','clientes','unidades','usuarios','config','system_users','imagenes'];
function save(){
  try{
    var d={};FIELDS.forEach(function(k){d[k]=S[k];});
    localStorage.setItem(DB,JSON.stringify(d));
    showToast('Guardado ✓');
  }catch(e){showToast('Error al guardar','error');}
}
function load(){
  try{
    var raw=localStorage.getItem(DB);
    if(raw){var d=JSON.parse(raw);FIELDS.forEach(function(k){if(d[k]!==undefined)S[k]=d[k];});}
    if(!S.unidades.length)S.unidades=[
      {id:'u1',nombre:'Litros',simbolo:'L',tipo:'volumen'},
      {id:'u2',nombre:'Kilogramos',simbolo:'kg',tipo:'masa'},
      {id:'u3',nombre:'Gramos',simbolo:'g',tipo:'masa'},
      {id:'u4',nombre:'Mililitros',simbolo:'ml',tipo:'volumen'},
      {id:'u5',nombre:'Unidades',simbolo:'u',tipo:'unidad'},
      {id:'u6',nombre:'Cajas',simbolo:'cj',tipo:'unidad'},
    ];
    // Seed default admin if no system_users exist
    if(!S.system_users||!S.system_users.length){
      S.system_users=[{
        id:uid(),email:'admin@piso2.com',password:'admin123',
        nombre:'Administrador',rol:'admin',activo:true,
        modulos:ALL_MODULES.map(function(m){return m.id;})
      }];
    }
  }catch(e){console.warn(e);}
  S.loaded=true;render();
}
function showToast(msg,type){
  var el=document.getElementById('save-indicator');if(!el)return;
  document.getElementById('si-text').textContent=msg;
  el.className='show'+(type==='error'?' error':'');
  setTimeout(function(){el.className='';},2000);
}
function exportBk(){
  var d={version:3,date:new Date().toISOString(),data:{}};
  FIELDS.forEach(function(k){d.data[k]=S[k];});
  var blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;
  a.download='spirits-erp-v3-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(url);
}
function importBk(file){
  var r=new FileReader();
  r.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);var data=d.data||d;
      FIELDS.forEach(function(k){if(data[k]!==undefined)S[k]=data[k];});
      save();render();alert('Backup importado correctamente');
    }catch(e){alert('Archivo inválido');}
  };r.readAsText(file);
}

function doLogin(){
  var email=gv('lemail').trim(),pass=gv('lpass'),err=document.getElementById('lerr');
  if(!email||!pass){err.style.display='block';err.textContent='Completá todos los campos';return;}
  var btn=document.getElementById('lbtn');btn.disabled=true;btn.textContent='Ingresando...';
  // Load data first if not loaded
  if(!S.loaded){load();}
  setTimeout(function(){
    var found=S.system_users.find(function(u){
      return u.email.toLowerCase()===email.toLowerCase()&&u.password===pass&&u.activo!==false;
    });
    if(!found){
      err.style.display='block';err.textContent='Email o contraseña incorrectos';
      btn.disabled=false;btn.textContent='Ingresar al sistema';return;
    }
    S.user=found;
    // Default to first allowed module
    var mods=found.modulos||[];
    if(mods.indexOf(S.activeSection)<0&&mods.length)S.activeSection=mods[0];
    render();
  },400);
}

function canAccess(modId){
  if(!S.user)return false;
  if(S.user.rol==='admin')return true;
  return(S.user.modulos||[]).indexOf(modId)>=0;
}

// ── CHARTS ────────────────────────────────────────────────────────────────────
function barChart(data,vKey,lKey,color){
  color=color||'#e6950a';
  if(!data.length)return'<div style="height:130px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px">Sin datos</div>';
  var max=Math.max.apply(null,data.map(function(d){return d[vKey]||0;}))||1;
  return'<div class="chart-bars">'+data.map(function(d){
    var pct=Math.round(((d[vKey]||0)/max)*100);
    return'<div class="chart-bar-col"><div class="chart-bar-inner"><div class="chart-bar" style="height:'+pct+'%;background:'+color+';opacity:.8"></div></div><div class="chart-label">'+esc(String(d[lKey]))+'</div></div>';
  }).join('')+'</div>';
}
function areaChart(data,vKey,lKey){
  var W=560,H=120,pl=38,pr=8,pt=8,pb=22,iW=W-pl-pr,iH=H-pt-pb;
  if(!data.length||!data.some(function(d){return d[vKey];}))
    return'<div style="height:'+H+'px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px">Sin datos</div>';
  var vals=data.map(function(d){return d[vKey];}),max=Math.max.apply(null,vals)||1;
  if(vals.length<2)return barChart(data,vKey,lKey);
  var pts=vals.map(function(v,i){return[pl+i*(iW/(vals.length-1)),pt+iH-((v/max)*iH)];});
  var line='M'+pts.map(function(p){return p[0]+','+p[1];}).join(' L');
  var area=line+' L'+pts[pts.length-1][0]+','+(pt+iH)+' L'+pts[0][0]+','+(pt+iH)+' Z';
  var yLines=[0,.5,1].map(function(f){var v=Math.round(f*max),y=pt+iH-((v/max)*iH);
    return'<line x1="'+pl+'" x2="'+(W-pr)+'" y1="'+y+'" y2="'+y+'" stroke="var(--border)" stroke-width="1"/>'+
      '<text x="'+(pl-4)+'" y="'+(y+4)+'" text-anchor="end" font-size="9" fill="var(--muted)" font-family="DM Mono,monospace">'+num(v)+'</text>';}).join('');
  var xLabels=data.map(function(d,i){return'<text x="'+(pl+i*(iW/(vals.length-1)))+'" y="'+(H-4)+'" text-anchor="middle" font-size="9" fill="var(--muted)" font-family="DM Mono,monospace">'+esc(String(d[lKey]))+'</text>';}).join('');
  return'<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px">'+
    '<defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e6950a" stop-opacity=".15"/><stop offset="100%" stop-color="#e6950a" stop-opacity="0"/></linearGradient></defs>'+
    yLines+xLabels+'<path d="'+area+'" fill="url(#ag)"/><path d="'+line+'" fill="none" stroke="#e6950a" stroke-width="2" stroke-linejoin="round"/>'+
    pts.map(function(p){return'<circle cx="'+p[0]+'" cy="'+p[1]+'" r="2.5" fill="#e6950a"/>';}).join('')+'</svg>';
}
function donut(data,colors){
  var total=data.reduce(function(a,b){return a+b.value;},0);
  if(!total)return'<div style="width:110px;height:110px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px">Sin datos</div>';
  var cx=55,cy=55,r=42,ri=27,a=-Math.PI/2;
  return'<svg viewBox="0 0 110 110" width="110" height="110">'+data.map(function(d,i){
    var sw=(d.value/total)*2*Math.PI;
    var x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a),x2=cx+r*Math.cos(a+sw),y2=cy+r*Math.sin(a+sw);
    var xi1=cx+ri*Math.cos(a),yi1=cy+ri*Math.sin(a),xi2=cx+ri*Math.cos(a+sw),yi2=cy+ri*Math.sin(a+sw);
    var lg=sw>Math.PI?1:0;
    var p='M'+x1+','+y1+' A'+r+','+r+' 0 '+lg+' 1 '+x2+','+y2+' L'+xi2+','+yi2+' A'+ri+','+ri+' 0 '+lg+' 0 '+xi1+','+yi1+' Z';
    a+=sw;return'<path d="'+p+'" fill="'+colors[i]+'" opacity=".85"/>';
  }).join('')+'</svg>';
}

            '<div style="font-size:9px;font-family:var(--mono);color:'+clr+';font-weight:600">'+num(t.litros)+'/'+num(t.capacidad)+'</div>'+

      }).join('')+

  // ── STOCK ALERTS ─────────────────────────────────────────────────────────
  var alertHtml='';

    alertHtml='<div class="panel" style="margin-bottom:14px;border-left:3px solid #C0392B">'+

      alertas.map(function(ins){

        return'<div style="display:flex;align-items:center;gap:10px;padding:8px;background:#fff5f5;border-radius:8px;border:1px solid #fde">'+
          '<div style="flex:1"><span style="font-weight:600;font-size:13px">'+esc(ins.nombre)+'</span>'+
          '<span class="tag" style="margin-left:6px;font-size:10px">'+esc(ins.categoria||'')+'</span></div>'+
          '<div style="text-align:right">'+
            '<div style="font-family:var(--mono);font-size:12px;font-weight:700;color:#C0392B">'+numDec(stock,1)+' '+getUnidad(ins.unidadId)+'</div>'+
            '<div style="font-size:10px;color:var(--muted)">mín: '+numDec(ins.stockMin,1)+'</div>'+

          '<div style="width:40px;text-align:right;font-family:var(--mono);font-size:11px;font-weight:700;color:#C0392B">'+pct+'%</div>'+
        '</div>';
      }).join('')+'</div></div>';

  // ── ACTIVE ORDERS ────────────────────────────────────────────────────────
  var ordenesHtml='';
  var ordenesActivas=S.producciones.filter(function(p){return p.estado==='En proceso'||p.estado==='Pendiente';}).slice(0,5);
  if(ordenesActivas.length){
    ordenesHtml='<div class="panel" style="margin-bottom:14px">'+
      '<div class="panel-header"><span class="panel-label">Órdenes en curso</span></div>'+
      '<div style="display:flex;flex-direction:column;gap:0">'+
      ordenesActivas.map(function(p){
        var op=S.operarios.find(function(o){return o.nombre===p.operario;})||{};
        var opImg=getImg('operario',op.id||p.operario);
        return'<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)">'+
          (opImg?'<img src="'+opImg+'" style="width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0"/>':
            '<div style="width:32px;height:32px;border-radius:50%;background:var(--amber);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#fff;flex-shrink:0">'+

          '<div style="flex:1;min-width:0">'+

          (p.inicio&&!p.fin?'<div style="font-size:11px;font-family:var(--mono);color:var(--amber);font-weight:700;width:60px;text-align:right" id="dt_'+p.id+'">—</div>':'')+
        '</div>';
      }).join('')+'</div></div>';
  }

  // ── RECENT SALES ─────────────────────────────────────────────────────────
  var ventasHtml='';
  var ventasRec=S.ventas.slice(0,6);
  if(ventasRec.length){
    ventasHtml='<div class="panel">'+
      '<div class="panel-header"><span class="panel-label">Últimas ventas</span></div>'+
      '<div style="display:flex;flex-direction:column;gap:0">'+
      ventasRec.map(function(v){
        var total=Number(v.cantidad)*Number(v.precio||0);
        return'<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)">'+
          '<div style="flex:1;min-width:0">'+
            '<div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(v.cliente)+'</div>'+
            '<div style="font-size:11px;color:var(--muted)">'+esc(v.producto)+' · x'+num(v.cantidad)+'</div>'+
          '</div>'+
          '<div style="text-align:right">'+
            '<div style="font-family:var(--mono);font-size:13px;font-weight:700;color:#2E7D52">$'+num(total)+'</div>'+
            badge(v.estado)+
          '</div>'+
        '</div>';
      }).join('')+'</div></div>';
  }

  return stitle('Panel de control',new Date().toLocaleDateString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric'}))+
    kpis+tankHtml+alertHtml+
    (ordenesHtml||ventasHtml?
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">'+
      (ordenesHtml||'')+(ventasHtml||'')+'</div>':'');
}

// ── ESTADÍSTICAS ──────────────────────────────────────────────────────────────
function rStats(){
  var map={};S.ventas.forEach(function(v){map[v.producto]=(map[v.producto]||0)+Number(v.cantidad)*Number(v.precio);});
  var vp=Object.keys(map).map(function(k){return{name:k.replace(/ \d+ml/g,''),val:map[k]};});
  var sp=[
    {name:'Destilería',value:S.tanques.filter(function(t){return t.sector==='Destilería';}).reduce(function(a,b){return a+Number(b.litros);},0)},
    {name:'Manipulación',value:S.tanques.filter(function(t){return t.sector==='Manipulación';}).reduce(function(a,b){return a+Number(b.litros);},0)},
    {name:'Reposo',value:S.tanques.filter(function(t){return t.sector==='Reposo';}).reduce(function(a,b){return a+Number(b.litros);},0)},
  ];
  var PC=['#e6950a','#1e3a8a','#3d7a54'];
  var totalR=S.ventas.reduce(function(a,b){return a+Number(b.cantidad)*Number(b.precio);},0);
  var totalL=S.tanques.reduce(function(a,b){return a+Number(b.litros);},0);
  var qcP=S.controles.filter(function(c){return c.aprobado;}).length;
  // Top insumos consumidos
  var consMap={};
  S.movimientos.filter(function(m){return m.cantidad<0;}).forEach(function(m){
    consMap[m.insumoId]=(consMap[m.insumoId]||0)+Math.abs(m.cantidad);
  });
  var topIns=Object.keys(consMap).map(function(id){
    var ins=S.insumos.find(function(x){return x.id===id;})||{nombre:id};
    return{name:ins.nombre,val:consMap[id]};
  }).sort(function(a,b){return b.val-a.val;}).slice(0,6);
  return stitle('Estadísticas','Métricas de producción y ventas')+
    '<div class="stat-grid">'+
      scard('Revenue Total','$'+num(totalR),'💰')+
      scard('Litros en Planta',(totalL/1000).toFixed(1)+'k L','🛢')+
      scard('Tasa QC',S.controles.length?Math.round(qcP/S.controles.length*100)+'%':'—','🧪')+
      scard('Productos',S.productos.length,'🍾')+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">'+
      '<div class="panel"><div class="panel-header"><span class="panel-label">Ventas por producto</span></div><div style="padding:14px">'+barChart(vp,'val','name')+'</div></div>'+
      '<div class="panel"><div class="panel-header"><span class="panel-label">Litros por sector</span></div>'+
      '<div style="padding:14px;display:flex;flex-direction:column;align-items:center">'+donut(sp,PC)+
      sp.map(function(s,i){return'<div style="display:flex;justify-content:space-between;width:100%;font-size:12px;margin-top:5px">'+
        '<span style="color:'+PC[i]+';font-weight:500">● '+esc(s.name)+'</span>'+
        '<span style="color:var(--muted);font-family:var(--mono)">'+num(s.value)+' L</span></div>';}).join('')+
      '</div></div></div>'+
    '<div class="panel"><div class="panel-header"><span class="panel-label">Top insumos consumidos</span></div>'+
    '<div style="padding:14px">'+(topIns.length?barChart(topIns,'val','name','#1e3a8a'):empty('📦','Sin movimientos de stock'))+'</div></div>';
}

function finalizarProd(id){
  var p=S.producciones.find(function(x){return x.id===id;});
  if(p){
    p.estado='Completado';p.fin=now();
    // Descontar insumos de stock según receta si tiene producto
    if(p.productoId){
      var receta=S.recetas.find(function(r){return r.productoId===p.productoId;});
      if(receta&&receta.ingredientes){
        var factor=p.litros||1;
        receta.ingredientes.forEach(function(ing){
          S.movimientos.push({
            id:uid(),insumoId:ing.insumoId,
            cantidad:-(Number(ing.cantidad)*factor),
            tipo:'Consumo producción',
            referencia:p.id,fecha:now().slice(0,10)
          });
        });
      }
    }
    save();
  }
  render();
}

// ── TRAZABILIDAD ──────────────────────────────────────────────────────────────
function rTrazabilidad(){
  var STAGES=['recepcion','tanque','destilacion','filtracion','mezcla','reposo','envasado','despacho'];
  var STAGE_L=['Recepción','Tanques','Destilación','Filtración','Mezclas','Reposo','Envasado','Despacho'];
  return stitle('Trazabilidad','Seguimiento de lotes',
    '<button class="btn btn-primary" onclick="openModalNew(\'newLote\')">+ Nuevo lote</button>')+
    (!S.lotes.length?'<div class="panel">'+empty('⊙','Sin lotes registrados.')+'</div>':
    S.lotes.map(function(l){
      var checks=l.checkpoints||['recepcion'];
      var cur=STAGES.indexOf(checks[checks.length-1]);
      return'<div class="panel" style="margin-bottom:10px"><div style="padding:13px 15px">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'+
        '<div><span style="font-family:var(--mono);font-size:12px;color:var(--amber);font-weight:700">'+esc(l.id)+'</span>'+
        '<div style="font-size:14px;font-weight:600;margin-top:1px">'+esc(l.producto)+'</div>'+
        '<div style="font-size:11px;color:var(--muted);margin-top:1px">'+num(l.volumen)+' L · '+l.graduacion+'° · '+esc(l.fecha)+'</div></div>'+
        badge(l.estado)+'</div>'+
        '<div style="display:flex;align-items:center;gap:0;overflow-x:auto;padding-bottom:4px">'+
        STAGES.map(function(s,i){
          var done=checks.indexOf(s)>=0;var isCur=i===cur;
          var bg=done?'#e6950a':isCur?'#fff8ee':'#f4f3f0';
          var c=done?'#fff':isCur?'#e6950a':'#9c9690';
          var bc=done?'#e6950a':isCur?'#e6950a':'#e8e4de';
          return'<div style="display:flex;align-items:center;flex-shrink:0">'+
            '<div style="background:'+bg+';border:2px solid '+bc+';color:'+c+';border-radius:7px;padding:4px 8px;font-size:10px;font-weight:600;cursor:'+(i>cur+1?'default':'pointer')+'" '+
            (i===cur+1?'onclick="advanceLote(\''+l.id+'\',\''+s+'\')"':'')+'>'+STAGE_L[i]+'</div>'+
            (i<STAGES.length-1?'<div style="width:10px;height:1px;background:var(--border);flex-shrink:0"></div>':'');
        }).join('')+'</div></div></div>';
    }).join(''));
}
function advanceLote(id,stage){
  var l=S.lotes.find(function(x){return x.id===id;});
  if(l){
    l.checkpoints=l.checkpoints||['recepcion'];
    if(l.checkpoints.indexOf(stage)<0)l.checkpoints.push(stage);
    var STAGE_L=['Recepción','Tanques','Destilación','Filtración','Mezclas','Reposo','Envasado','Despacho'];
    var STAGES=['recepcion','tanque','destilacion','filtracion','mezcla','reposo','envasado','despacho'];
    l.estado=STAGE_L[STAGES.indexOf(stage)]||'Activo';
    save();render();
  }
}

function saveCfg(){S.config.empresa=gv('cfg_emp')||S.config.empresa;S.config.sector=gv('cfg_sec')||S.config.sector;save();render();}

// ── SUBMIT FUNCTIONS ──────────────────────────────────────────────────────────
function submitOp(idx){
  var nombre=gv('opn').trim();if(!nombre)return;
  var op={id:idx>=0?S.operarios[idx].id:uid(),nombre:nombre,cargo:gv('opc'),dni:gv('opd'),telefono:gv('opt'),email:gv('ope'),domicilio:gv('opdom')};
  if(idx>=0)S.operarios[idx]=op;else S.operarios.push(op);
  save();closeModal();
}
function submitTank(){
  var id=gv('tkid').trim();if(!id)return;
  var tk={id:id,sector:gv('tksec')||'Destilería',contenido:gv('tkcont'),capacidad:gvn('tkcap'),litros:gvn('tklit')};
  if(S.editIdx!==null){
    var idx=S.tanques.findIndex(function(t){return t.id===S.editIdx;});
    if(idx>=0)S.tanques[idx]=tk;else S.tanques.push(tk);
  } else {
    S.tanques.push(tk);
  }
  save();closeModal();
}
function submitProducto(idx){
  var nombre=gv('pnombre').trim();if(!nombre)return;
  var p={id:idx>=0?S.productos[idx].id:uid(),nombre:nombre,categoria:gv('pcat'),graduacion:gvn('pgrad'),descripcion:gv('pdesc'),presentacion:gvn('ppres'),precioVenta:gvn('pprecio'),activo:gv('pactivo')!=='Inactivo'};
  if(idx>=0)S.productos[idx]=p;else S.productos.push(p);
  save();closeModal();
}
function addIngrediente(prodId){

function submitUsuario(idx){
  var nombre=gv('usnombre').trim(),email=gv('usemail').trim().toLowerCase();
  var pass=gv('uspass'),rol=gv('usrol')||'operador';
  if(!nombre||!email){alert('Nombre y email son obligatorios');return;}
  if(idx<0&&!pass){alert('La contraseña es obligatoria para nuevos usuarios');return;}
  // Check duplicate email
  var dupIdx=S.system_users.findIndex(function(u,i){return u.email.toLowerCase()===email&&i!==idx;});
  if(dupIdx>=0){alert('Ya existe un usuario con ese email');return;}
  // Collect selected modules
  var mods=ALL_MODULES.map(function(m){return m.id;}).filter(function(id){
    var el=document.getElementById('mp_'+id);return el&&el.checked;
  });
  if(idx>=0){
    var u=S.system_users[idx];
    u.nombre=nombre;u.email=email;u.rol=rol;
    if(pass)u.password=pass;
    u.modulos=rol==='admin'?ALL_MODULES.map(function(m){return m.id;}):mods;
  } else {
    S.system_users.push({
      id:uid(),nombre:nombre,email:email,password:pass,rol:rol,activo:true,
      modulos:rol==='admin'?ALL_MODULES.map(function(m){return m.id;}):mods
    });
  }
  save();closeModal();
}

// ── EXCEL IMPORT / EXPORT ─────────────────────────────────────────────────────

function leerExcel(file, callback){
  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var data = new Uint8Array(e.target.result);
      var wb = XLSX.read(data, {type:'array'});
      var ws = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      callback(null, rows);
    } catch(err){ callback('No se pudo leer el archivo: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function normKey(str){
  return String(str||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]/g,'');
}

// Busca una columna por varios nombres posibles
function getCol(row, aliases){
  for(var i=0;i<aliases.length;i++){
    var k=normKey(aliases[i]);
    for(var col in row){
      if(normKey(col)===k) return String(row[col]||'').trim();
    }
  }
  return '';
}

// ── PRODUCTOS ──────────────────────────────────────────────────────────────────
function importExcelProductos(file){
  if(!file) return;
  leerExcel(file, function(err, rows){
    if(err){ alert('Error: '+err); return; }
    if(!rows.length){ alert('El archivo está vacío o no tiene el formato correcto.'); return; }

    var agregados=0, omitidos=0, errores=[];
    rows.forEach(function(row, i){
      var nombre = getCol(row,['nombre','producto','name','bebida']);
      if(!nombre){ omitidos++; return; }

      // Evitar duplicados por nombre
      var existe = S.productos.find(function(p){
        return p.nombre.toLowerCase()===nombre.toLowerCase();
      });
      if(existe){ omitidos++; return; }

      S.productos.push({
        id: uid(),
        nombre: nombre,
        categoria: getCol(row,['categoria','categoría','tipo','category']) || 'Otro',
        graduacion: Number(getCol(row,['graduacion','graduación','alcohol','abv','grado'])) || 0,
        descripcion: getCol(row,['descripcion','descripción','description','detalle']),
        presentacion: Number(getCol(row,['presentacion','presentación','ml','volumen'])) || 0,
        precioVenta: Number(getCol(row,['precio','price','precioventa','precio venta'])) || 0,
        activo: true
      });
      agregados++;
    });

    save(); render();
    mostrarResultadoImport('Productos', agregados, omitidos, errores);
  });
}

// ── INSUMOS ────────────────────────────────────────────────────────────────────
function importExcelInsumos(file){
  if(!file) return;
  leerExcel(file, function(err, rows){
    if(err){ alert('Error: '+err); return; }
    if(!rows.length){ alert('El archivo está vacío o no tiene el formato correcto.'); return; }

    var agregados=0, omitidos=0, stockAgregado=0;
    rows.forEach(function(row){
      var nombre = getCol(row,['nombre','insumo','name','material','materia prima']);
      if(!nombre){ omitidos++; return; }

      // Buscar si ya existe
      var existente = S.insumos.find(function(ins){
        return ins.nombre.toLowerCase()===nombre.toLowerCase();
      });

      // Resolver unidad
      var unidadSimbolo = getCol(row,['unidad','unit','simbolo','símbolo','um']);
      var unidadObj = S.unidades.find(function(u){
        return u.simbolo.toLowerCase()===(unidadSimbolo||'').toLowerCase() ||
               u.nombre.toLowerCase()===(unidadSimbolo||'').toLowerCase();
      });
      var unidadId = unidadObj ? unidadObj.id : (S.unidades[0]?S.unidades[0].id:'u1');

      // Resolver proveedor
      var provNombre = getCol(row,['proveedor','supplier','vendor','proveedor nombre']);
      var provObj = S.proveedores.find(function(p){
        return p.nombre.toLowerCase()===(provNombre||'').toLowerCase();
      });

      var stockInicial = Number(getCol(row,['stock','stock inicial','cantidad','quantity','existencia'])) || 0;

      if(!existente){
        var insId = uid();
        S.insumos.push({
          id: insId,
          nombre: nombre,
          codigo: getCol(row,['codigo','código','code','sku']),
          categoria: getCol(row,['categoria','categoría','tipo','category']) || 'Insumos varios',
          unidadId: unidadId,
          stockMin: Number(getCol(row,['stock min','stockmin','minimo','mínimo','stock minimo'])) || 0,
          stockMax: Number(getCol(row,['stock max','stockmax','maximo','máximo','stock maximo'])) || 0,
          proveedorId: provObj ? provObj.id : '',
          notas: getCol(row,['notas','notes','observaciones'])
        });
        // Cargar stock inicial si viene
        if(stockInicial>0){
          S.movimientos.push({
            id:uid(), insumoId:insId, cantidad:stockInicial,
            tipo:'Carga inicial Excel', referencia:'Importación', fecha:new Date().toISOString().slice(0,10)
          });
          stockAgregado++;
        }
        agregados++;
      } else {
        // Si ya existe pero trae stock, igual lo suma
        if(stockInicial>0){
          S.movimientos.push({
            id:uid(), insumoId:existente.id, cantidad:stockInicial,
            tipo:'Carga inicial Excel', referencia:'Importación', fecha:new Date().toISOString().slice(0,10)
          });
          stockAgregado++;
        }
        omitidos++;
      }
    });

    save(); render();
    var extra = stockAgregado>0 ? '\n📦 Stock inicial cargado para '+stockAgregado+' insumo(s).' : '';
    mostrarResultadoImport('Insumos', agregados, omitidos, [], extra);
  });
}

    ['Enebro seco','BOT-001','Botánicos','kg',20,5,50,'Botánicos del Norte',''],

function mostrarResultadoImport(tipo, agregados, omitidos, errores, extra){
  var msg = '✅ Importación de '+tipo+' completada:\n\n'+
    '• '+agregados+' registro(s) agregado(s)\n'+
    '• '+omitidos+' omitido(s) (ya existían o faltaba nombre)'+(extra||'');
  if(errores&&errores.length) msg+='\n⚠ Errores: '+errores.join(', ');
  alert(msg);
}
