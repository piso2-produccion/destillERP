:root{
  --mono:'DM Mono',monospace;
  --serif:'Playfair Display',serif;
  --amber:#e6950a;
  --amber-light:#fff8ee;
  --amber-border:#ffe0a0;
  --bg:#f4f3f0;
  --white:#fff;
  --border:#e8e4de;
  --text:#1a1a1a;
  --muted:#9c9690;
  --sub:#4a4540;
  --green:#3d7a54;
  --blue:#1e3a8a;
  --red:#8a1e1e;
  --sidebar:230px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#c9c4bc;border-radius:3px}
input,select,button,textarea{font-family:"DM Sans",sans-serif;outline:none}
button{cursor:pointer}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .25s ease forwards}

/* ── LAYOUT ── */
#app{display:flex;min-height:100vh;min-height:-webkit-fill-available}

/* Sidebar — desktop */
#sidebar{
  width:var(--sidebar);background:var(--white);border-right:1px solid var(--border);
  position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:20;
  padding-top:var(--safe-top);
  transition:transform .25s ease;
}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:19;backdrop-filter:blur(2px)}

#main{
  margin-left:var(--sidebar);flex:1;padding:28px 32px;
  padding-bottom:calc(20px + var(--safe-bottom));
  min-height:100vh;background:var(--bg);
}

/* Mobile nav bottom bar */
#mobile-nav{display:none}

/* ── SIDEBAR ELEMENTS ── */
.sidebar-logo{padding:16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:2px}
.sidebar-logo .logo-mark{
  width:44px;height:44px;background:var(--text);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:18px;font-weight:700;color:var(--amber);
  letter-spacing:-.02em;margin-bottom:4px;
}
.sidebar-logo .logo-name{font-size:13px;font-weight:700;color:var(--text)}
.sidebar-logo small{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
nav{flex:1;padding:8px;overflow-y:auto}
.nav-btn{
  display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;
  border-radius:9px;margin-bottom:1px;border:1px solid transparent;
  color:var(--muted);font-size:13px;font-weight:400;background:transparent;
  text-align:left;transition:all .12s;
}
.nav-btn:hover{background:var(--amber-light);color:var(--text)}
.nav-btn.active{background:var(--amber-light);border-color:var(--amber-border);color:var(--text);font-weight:600}
.nav-btn .nav-icon{font-size:14px;width:18px;text-align:center;opacity:.6}
.nav-btn.active .nav-icon{opacity:1}
.sidebar-footer{padding:10px 12px;border-top:1px solid var(--border);padding-bottom:calc(10px + var(--safe-bottom))}
.sidebar-email{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:8px}
.logout-btn{width:100%;background:none;border:1px solid var(--border);border-radius:8px;padding:7px;font-size:11px;color:var(--muted);transition:background .12s}
.logout-btn:hover{background:var(--bg)}

/* ── SECTIONS ── */
.section-title{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.section-title h2{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:-.02em;color:var(--text);line-height:1}
.section-title p{margin:4px 0 0;color:var(--muted);font-size:13px}

/* ── PANELS ── */
.panel{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.panel-header{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.panel-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px 14px}
.stat-card .sc-icon{font-size:20px;margin-bottom:8px}
.stat-card .sc-val{font-size:20px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1;margin-bottom:3px}
.stat-card .sc-lbl{font-size:11px;color:var(--muted)}

/* ── TABLES ── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#faf9f7}
th{text-align:left;padding:10px 12px;color:var(--muted);font-weight:600;font-size:10px;letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);background:var(--white);transition:background .1s}
tbody tr:hover{background:#faf9f7}
td{padding:10px 12px;color:var(--sub);font-size:13px}

/* ── BADGES ── */
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mono);white-space:nowrap}

/* ── BUTTONS ── */
.btn{border:none;border-radius:9px;padding:9px 18px;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(.97)}
.btn-sm{border:none;border-radius:7px;padding:5px 11px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .12s}
.btn-sm:active{transform:scale(.95)}
.btn-primary{background:var(--amber);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-amber{background:#d97706;color:#fff}
.btn-outline-blue{background:transparent;color:var(--blue);border:1.5px solid var(--blue)}
.btn-outline-red{background:transparent;color:var(--red);border:1.5px solid var(--red)}
.btn-outline-muted{background:transparent;color:var(--muted);border:1.5px solid var(--muted)}
.btn-danger{background:#dc2626;color:#fff}
.btn:hover{opacity:.85}

/* ── FORMS ── */
.input-group{margin-bottom:13px}
.input-group label{display:block;font-size:11px;color:var(--sub);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.input-group input,.input-group select,.input-group textarea{
  width:100%;background:var(--white);border:1.5px solid #d4cfc8;border-radius:9px;
  padding:9px 12px;color:var(--text);font-size:13px;transition:border-color .15s;
}
.input-group input:focus,.input-group select:focus,.input-group textarea:focus{border-color:var(--amber)}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(26,26,26,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0;backdrop-filter:blur(3px)}
.modal-box{
  background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:700px;
  padding:24px 24px calc(24px + var(--safe-bottom));
  box-shadow:0 -8px 40px rgba(0,0,0,.15);
  max-height:90vh;overflow-y:auto;animation:slideUp .25s ease;
}
@media(min-width:600px){
  .modal-overlay{align-items:center;padding:20px}
  .modal-box{border-radius:18px;padding:28px;max-height:88vh}
}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-header h3{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--text)}
.modal-close{background:#f0ede8;border:none;color:var(--sub);width:30px;height:30px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}

/* ── LOGIN ── */
#login-screen{
  min-height:100vh;min-height:-webkit-fill-available;
  background:linear-gradient(145deg,#1a1a16 0%,#2c2820 50%,#1a1a16 100%);
  display:flex;align-items:center;justify-content:center;padding:20px;
  padding-top:calc(20px + var(--safe-top));
  padding-bottom:calc(20px + var(--safe-bottom));
}
.login-input{
  width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:12px 14px;color:#fff;font-size:14px;
  transition:border-color .15s;
}
.login-input:focus{border-color:rgba(230,149,10,.6);outline:none}
.login-btn{
  width:100%;background:var(--amber);border:none;border-radius:10px;
  padding:13px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;
  transition:opacity .15s;letter-spacing:.02em;
}
.login-btn:active{opacity:.85}

/* ── CHARTS ── */
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:140px;padding:4px 0}
.chart-bar-col{display:flex;flex-direction:column;align-items:center;flex:1;height:100%}
.chart-bar-inner{width:100%;display:flex;flex-direction:column;justify-content:flex-end;height:calc(100% - 20px)}
.chart-bar{width:100%;border-radius:4px 4px 0 0;min-height:2px;transition:height .3s}
.chart-label{font-size:9px;color:var(--muted);margin-top:4px;font-family:var(--mono);text-align:center}

/* ── MISC ── */
.timer-val{color:var(--green);font-weight:700;font-size:13px;font-family:var(--mono)}
.timer-ts{color:var(--muted);font-size:10px;font-family:var(--mono)}
.timer-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1s infinite;display:inline-block}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--mono);flex-shrink:0}
.op-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;transition:box-shadow .15s}
.op-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07)}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
#save-indicator{
  position:fixed;bottom:calc(20px + var(--safe-bottom));right:20px;
  background:var(--text);color:#fff;padding:8px 14px;border-radius:20px;
  font-size:12px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;
  pointer-events:none;display:flex;align-items:center;gap:8px;
}
#save-indicator.show{opacity:1}
#install-banner{
  display:none;position:fixed;bottom:calc(70px + var(--safe-bottom));left:12px;right:12px;
  background:var(--text);color:#fff;border-radius:14px;padding:14px 16px;
  z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.25);animation:slideUp .3s ease;
  flex-direction:row;align-items:center;gap:12px;
}
#install-banner.show{display:flex}
.config-section{margin-bottom:24px}
.config-section h4{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.config-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.config-row:last-child{border-bottom:none}
.config-row label{font-size:13px;font-weight:500}
.config-row small{display:block;font-size:11px;color:var(--muted);margin-top:2px}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#d4cfc8;border-radius:24px;cursor:pointer;transition:.2s}
.toggle-slider:before{content:"";position:absolute;width:20px;height:20px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked + .toggle-slider{background:var(--amber)}
.toggle input:checked + .toggle-slider:before{transform:translateX(20px)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.show{display:block}
  #main{margin-left:0;padding:16px 14px 80px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  #mobile-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:var(--white);border-top:1px solid var(--border);
    padding:8px 0 calc(8px + var(--safe-bottom));z-index:18;
    box-shadow:0 -4px 20px rgba(0,0,0,.06);
  }
  .mob-nav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    background:none;border:none;color:var(--muted);font-size:9px;font-weight:500;
    padding:4px 2px;transition:color .12s;
  }
  .mob-nav-btn.active{color:var(--amber)}
  .mob-nav-btn .mob-icon{font-size:20px;line-height:1}
  .form-grid-2{grid-template-columns:1fr}
  .section-title{flex-direction:column;align-items:flex-start}
  .section-title .section-actions{width:100%}
  .section-title .section-actions .btn{width:100%;justify-content:center}
  #install-banner{bottom:calc(80px + var(--safe-bottom))}
  #save-indicator{bottom:calc(80px + var(--safe-bottom))}
  .modal-box{padding-bottom:calc(28px + var(--safe-bottom))}
}
@media(max-width:480px){
  .stat-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat-card{padding:12px}
  .stat-card .sc-val{font-size:17px}
  table{font-size:12px}
  td,th{padding:8px 10px}
}

/* Hamburger menu btn */
#menu-btn{
  display:none;position:fixed;top:calc(12px + var(--safe-top));left:14px;
  z-index:21;background:var(--white);border:1px solid var(--border);border-radius:10px;
  width:38px;height:38px;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
@media(max-width:768px){#menu-btn{display:flex}}
.hamburger{display:flex;flex-direction:column;gap:4px}
.hamburger span{width:16px;height:2px;background:var(--text);border-radius:2px;display:block;transition:.2s}
</style>
</head>
<body>
<div id="app"></div>
<div id="save-indicator"><span class="spinner" id="si-spin" style="display:none"></span><span id="si-text">Guardado</span></div>
<div id="sidebar-overlay" onclick="closeSidebar()"></div>
<button id="menu-btn" onclick="toggleSidebar()" aria-label="Menú">
  <div class="hamburger"><span></span><span></span><span></span></div>
</button>
<div id="install-banner">
  <div style="flex:1">
    <div style="font-size:13px;font-weight:700;margin-bottom:2px">Instalar app</div>
    <div style="font-size:11px;color:rgba(255,255,255,.6)">Agregá el ERP a tu pantalla de inicio — funciona sin internet</div>
  </div>
  <button onclick="installApp()" style="background:var(--amber);border:none;border-radius:9px;padding:9px 14px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap">Instalar</button>
  <button onclick="dismissInstall()" style="background:rgba(255,255,255,.1);border:none;border-radius:9px;padding:9px 10px;color:#fff;font-size:12px;cursor:pointer">✕</button>
</div>

<script>
'use strict';

// ── STORAGE KEY ──────────────────────────────────────────────────────────────
var DB_KEY = 'spirits_erp_data_v2';

// ── STATE ─────────────────────────────────────────────────────────────────────
var state = {
  user: null,
  loaded: false,
  activeSection: 'dashboard',
  modal: null,
  opEdit: null, opView: null,
  operarios: [], tanques: [], lotes: [],
  controles: [], ventas: [], producciones: [],
  config: {
    empresa: 'Piso 2 S.A.',
    sector: 'Industria de Bebidas',
    notifTimers: true,
    darkMode: false,
    backupAuto: true,
  }
};
var activeTimers = {};

// ── PERSISTENCE ───────────────────────────────────────────────────────────────
function saveData(){
  try{
    var d={
      operarios:state.operarios,tanques:state.tanques,lotes:state.lotes,
      controles:state.controles,ventas:state.ventas,producciones:state.producciones,
      config:state.config
    };
    localStorage.setItem(DB_KEY,JSON.stringify(d));
    showSaved('Guardado ✓');
  }catch(e){showSaved('Error al guardar','error');}
}
function loadData(){
  try{
    var raw=localStorage.getItem(DB_KEY);
    if(raw){
      var d=JSON.parse(raw);
      state.operarios=d.operarios||[];
      state.tanques=d.tanques||[];
      state.lotes=d.lotes||[];
      state.controles=d.controles||[];
      state.ventas=d.ventas||[];
      state.producciones=d.producciones||[];
      if(d.config)state.config=Object.assign(state.config,d.config);
    }
  }catch(e){console.warn('Load error:',e);}
  state.loaded=true; render();
}
function showSaved(msg,type){
  var el=document.getElementById('save-indicator');
  if(!el)return;
  document.getElementById('si-text').textContent=msg;
  el.className='show'+(type==='error'?' error':'');
  setTimeout(function(){el.className='';},1800);
}
function exportBackup(){
  var d={
    version:1,date:new Date().toISOString(),
    data:{operarios:state.operarios,tanques:state.tanques,lotes:state.lotes,
      controles:state.controles,ventas:state.ventas,producciones:state.producciones,
      config:state.config}
  };
  var blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='spirits-erp-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(url);
}
function importBackup(file){
  var r=new FileReader();
  r.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);
      var data=d.data||d;
      state.operarios=data.operarios||state.operarios;
      state.tanques=data.tanques||state.tanques;
      state.lotes=data.lotes||state.lotes;
      state.controles=data.controles||state.controles;
      state.ventas=data.ventas||state.ventas;
      state.producciones=data.producciones||state.producciones;
      if(data.config)state.config=Object.assign(state.config,data.config);
      saveData(); render();
      alert('Backup importado correctamente');
    }catch(err){alert('Archivo inválido');}
  };
  r.readAsText(file);
}

// ── PWA INSTALL ───────────────────────────────────────────────────────────────
var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();deferredPrompt=e;
  if(!sessionStorage.getItem('install_dismissed')){
    document.getElementById('install-banner').classList.add('show');
  }
});
function installApp(){
  document.getElementById('install-banner').classList.remove('show');
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;}
}
function dismissInstall(){
  document.getElementById('install-banner').classList.remove('show');
  sessionStorage.setItem('install_dismissed','1');
}

// ── SERVICE WORKER ────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('data:application/javascript;base64,CmNvbnN0IENBQ0hFID0gJ3NwaXJpdHMtZXJwLXYyJzsKc2VsZi5hZGRFdmVudExpc3RlbmVyKCdpbnN0YWxsJywgZSA9PiB7IHNlbGYuc2tpcFdhaXRpbmcoKTsgfSk7CnNlbGYuYWRkRXZlbnRMaXN0ZW5lcignYWN0aXZhdGUnLCBlID0+IHsgc2VsZi5jbGllbnRzLmNsYWltKCk7IH0pOwpzZWxmLmFkZEV2ZW50TGlzdGVuZXIoJ2ZldGNoJywgZSA9PiB7CiAgZS5yZXNwb25kV2l0aCgKICAgIGNhY2hlcy5vcGVuKENBQ0hFKS50aGVuKGNhY2hlID0+CiAgICAgIGZldGNoKGUucmVxdWVzdCkudGhlbihyZXNwID0+IHsKICAgICAgICBjYWNoZS5wdXQoZS5yZXF1ZXN0LCByZXNwLmNsb25lKCkpOwogICAgICAgIHJldHVybiByZXNwOwogICAgICB9KS5jYXRjaCgoKSA9PiBjYWNoZXMubWF0Y2goZS5yZXF1ZXN0KSkKICAgICkKICApOwp9KTsK').catch(function(){});
}

// ── SIDEBAR MOBILE ────────────────────────────────────────────────────────────
function toggleSidebar(){
  var sb=document.getElementById('sidebar');
  var ov=document.getElementById('sidebar-overlay');
  if(sb){sb.classList.toggle('open');ov.classList.toggle('show');}
}
function closeSidebar(){
  var sb=document.getElementById('sidebar');
  var ov=document.getElementById('sidebar-overlay');
  if(sb){sb.classList.remove('open');ov.classList.remove('show');}
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function esc(s){
  if(s==null)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function num(n){return Number(n||0).toLocaleString('es-AR');}
function now(){return new Date().toISOString().replace('T',' ').slice(0,19);}
function fmtElapsed(s){
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return (h?h+'h ':'')+(m?m+'m ':'')+sec+'s';
}

// ── CHARTS ────────────────────────────────────────────────────────────────────
function barChart(data,vKey,lKey,color){
  color=color||'#e6950a';
  if(!data.length)return'<div style="height:140px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px">Sin datos</div>';
  var max=Math.max.apply(null,data.map(function(d){return d[vKey]||0;}))||1;
  return'<div class="chart-bars">'+data.map(function(d){
    var pct=Math.round(((d[vKey]||0)/max)*100);
    return'<div class="chart-bar-col"><div class="chart-bar-inner"><div class="chart-bar" style="height:'+pct+'%;background:'+color+';opacity:.8"></div></div><div class="chart-label">'+esc(String(d[lKey]))+'</div></div>';
  }).join('')+'</div>';
}
function areaChart(data,vKey,lKey){
  var W=560,H=130,pl=40,pr=8,pt=8,pb=24,iW=W-pl-pr,iH=H-pt-pb;
  if(!data.length||!data.some(function(d){return d[vKey];}))
    return'<div style="height:'+H+'px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px">Sin datos</div>';
  var vals=data.map(function(d){return d[vKey];}),max=Math.max.apply(null,vals)||1;
  if(vals.length<2)return barChart(data,vKey,lKey);
  var pts=vals.map(function(v,i){return[pl+i*(iW/(vals.length-1)),pt+iH-((v/max)*iH)];});
  var line='M'+pts.map(function(p){return p[0]+','+p[1];}).join(' L');
  var area=line+' L'+pts[pts.length-1][0]+','+(pt+iH)+' L'+pts[0][0]+','+(pt+iH)+' Z';
  var yLines=[0,.5,1].map(function(f){
    var v=Math.round(f*max),y=pt+iH-((v/max)*iH);
    return'<line x1="'+pl+'" x2="'+(W-pr)+'" y1="'+y+'" y2="'+y+'" stroke="var(--border)" stroke-width="1"/>'+
      '<text x="'+(pl-5)+'" y="'+(y+4)+'" text-anchor="end" font-size="9" fill="var(--muted)" font-family="DM Mono,monospace">'+num(v)+'</text>';
  }).join('');
  var xLabels=data.map(function(d,i){
    return'<text x="'+(pl+i*(iW/(vals.length-1)))+'" y="'+(H-5)+'" text-anchor="middle" font-size="9" fill="var(--muted)" font-family="DM Mono,monospace">'+esc(String(d[lKey]))+'</text>';
  }).join('');
  return'<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px">'+
    '<defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0%" stop-color="#e6950a" stop-opacity=".15"/><stop offset="100%" stop-color="#e6950a" stop-opacity="0"/></linearGradient></defs>'+
    yLines+xLabels+
    '<path d="'+area+'" fill="url(#ag)"/>'+
    '<path d="'+line+'" fill="none" stroke="#e6950a" stroke-width="2" stroke-linejoin="round"/>'+
    pts.map(function(p){return'<circle cx="'+p[0]+'" cy="'+p[1]+'" r="2.5" fill="#e6950a"/>';}).join('')+'</svg>';
}
function donut(data,colors){
  var total=data.reduce(function(a,b){return a+b.value;},0);
  if(!total)return'<div style="width:120px;height:120px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px">Sin datos</div>';
  var cx=60,cy=60,r=46,ri=30,a=-Math.PI/2;
  return'<svg viewBox="0 0 120 120" width="120" height="120">'+data.map(function(d,i){
    var sw=(d.value/total)*2*Math.PI;
    var x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a),x2=cx+r*Math.cos(a+sw),y2=cy+r*Math.sin(a+sw);
    var xi1=cx+ri*Math.cos(a),yi1=cy+ri*Math.sin(a),xi2=cx+ri*Math.cos(a+sw),yi2=cy+ri*Math.sin(a+sw);
    var lg=sw>Math.PI?1:0;
    var p='M'+x1+','+y1+' A'+r+','+r+' 0 '+lg+' 1 '+x2+','+y2+' L'+xi2+','+yi2+' A'+ri+','+ri+' 0 '+lg+' 0 '+xi1+','+yi1+' Z';
    a+=sw;
    return'<path d="'+p+'" fill="'+colors[i]+'" opacity=".85"/>';
  }).join('')+'</svg>';
}

function startTimers(){
  [].concat(state.producciones,state.controles).forEach(function(item){
    if(item.inicio&&!item.fin){
      var tid='t'+item.inicio.replace(/[^0-9]/g,'');
      var el=document.getElementById(tid);
      if(el){
        var start=new Date(item.inicio.replace(' ','T')).getTime();
        (function(tid2,s2){
          var tick=function(){var e=document.getElementById(tid2);if(e)e.textContent=fmtElapsed(Math.floor((Date.now()-s2)/1000));};
          tick(); activeTimers[tid2]=setInterval(tick,1000);
        })(tid,start);
      }
    }
  });
}

// ── TRAZABILIDAD ──────────────────────────────────────────────────────────────
function rTrazabilidad(){
  var STAGES=['recepcion','tanque','destilacion','filtracion','mezcla','reposo','envasado'];
  var STAGE_L=['Recepción','Tanques','Destilación','Filtración','Mezclas','Reposo','Envasado'];
  if(!state.lotes.length)return stitle('Trazabilidad','Seguimiento de lotes',
    '<button class="btn btn-primary" onclick="openModal(\'newLote\')">+ Nuevo lote</button>')+
    '<div class="panel">'+empty('⊙','Sin lotes registrados.')+'</div>';
  return stitle('Trazabilidad','Seguimiento de lotes',
    '<button class="btn btn-primary" onclick="openModal(\'newLote\')">+ Nuevo lote</button>')+
    state.lotes.map(function(l){
      var checks=l.checkpoints||['recepcion'];
      var cur=STAGES.indexOf(checks[checks.length-1]);
      return'<div class="panel" style="margin-bottom:12px"><div style="padding:14px 16px">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">'+
        '<div><span style="font-family:var(--mono);font-size:12px;color:var(--amber);font-weight:700">'+esc(l.id)+'</span>'+
        '<div style="font-size:14px;font-weight:600;margin-top:2px">'+esc(l.producto)+'</div>'+
        '<div style="font-size:11px;color:var(--muted);margin-top:2px">'+num(l.volumen)+' L · '+l.graduacion+'° · '+esc(l.fecha)+'</div></div>'+
        badge(l.estado)+'</div>'+
        '<div style="display:flex;align-items:center;gap:0;overflow-x:auto;padding-bottom:4px">'+
        STAGES.map(function(s,i){
          var done=checks.indexOf(s)>=0;var isCur=i===cur;
          var bg=done?'#e6950a':isCur?'#fff8ee':'#f4f3f0';
          var c=done?'#fff':isCur?'#e6950a':'#9c9690';
          var bc=done?'#e6950a':isCur?'#e6950a':'#e8e4de';
          return'<div style="display:flex;align-items:center;flex-shrink:0">'+
            '<div style="background:'+bg+';border:2px solid '+bc+';color:'+c+';border-radius:8px;padding:4px 8px;font-size:10px;font-weight:600;cursor:'+(i>cur+1?'default':'pointer')+'" '+
            (i===cur+1?'onclick="advanceLote(\''+l.id+'\',\''+s+'\')"':'')+'>'+STAGE_L[i]+'</div>'+
            (i<STAGES.length-1?'<div style="width:12px;height:1px;background:var(--border);flex-shrink:0"></div>':'');
        }).join('')+'</div></div></div>';
    }).join('');
}
function advanceLote(id,stage){
  var l=state.lotes.find(function(x){return x.id===id;});
  if(l){
    l.checkpoints=l.checkpoints||['recepcion'];
    if(l.checkpoints.indexOf(stage)<0)l.checkpoints.push(stage);
    var STAGES=['recepcion','tanque','destilacion','filtracion','mezcla','reposo','envasado'];
    var STAGES_L=['Recepción','Tanques','Destilación','Filtración','Mezclas','Reposo','Envasado'];
    var idx=STAGES.indexOf(stage);
    l.estado=idx>=0?STAGES_L[idx]:'Activo';
    saveData();render();
  }
}

      '<button class="btn btn-primary" style="width:100%;justify-content:center" onclick="submitVenta()">Crear orden</button>';
  }
  return'<div class="modal-overlay" onclick="overlayClose(event)"><div class="modal-box" onclick="event.stopPropagation()">'+c+'</div></div>';
}

function openModal(name){state.modal=name;render();}
function closeModal(){state.modal=null;state.opEdit=null;state.opView=null;render();}
function overlayClose(e){if(e.target.classList.contains('modal-overlay'))closeModal();}

function submitOp(idx){
  var nombre=gv('opnombre').trim();if(!nombre)return;
  var op={id:idx>=0?state.operarios[idx].id:'op-'+Date.now(),nombre:nombre,cargo:gv('opcargo'),dni:gv('opdni'),telefono:gv('optel'),email:gv('opemail'),domicilio:gv('opdomicilio')};
  if(idx>=0)state.operarios[idx]=op;else state.operarios.push(op);
  saveData();closeModal();
}
function submitTank(){
  var id=gv('tkidnew').trim();if(!id)return;
  var t={id:id,sector:gv('tksecnew')||'Destilería',contenido:gv('tkcontnew'),capacidad:Number(gv('tkcapnew'))||0,litros:Number(gv('tklitrosnew'))||0};
  state.tanques.push(t);saveData();closeModal();
}
function submitProd(){
  var op=gv('mop'),tipo=gv('mtipo'),orig=gv('morig');if(!op||!tipo||!orig)return;
  var p={id:'OP-'+(100+state.producciones.length+1),tipo:tipo,origen:orig,destino:gv('mdest'),gIn:gv('mgin'),gOut:gv('mgout'),litros:Number(gv('mlit'))||0,estado:'Pendiente',fecha:new Date().toISOString().slice(0,10),operario:op,inicio:null,fin:null};
  state.producciones.unshift(p);saveData();closeModal();
}
function submitControl(){
  var resp=gv('mresp'),lote=gv('mlote'),punto=gv('mpunto');if(!resp||!lote||!punto)return;
  var grad=Number(gv('mgrad')),meta=gv('mmeta'),aprobado=grad>0&&meta==='ND';
  var c={id:'QC-'+(100+state.controles.length+1),lote:lote,punto:punto,responsable:resp,graduacion:grad,turbidez:gv('mturb'),metanol:meta,aprobado:aprobado,fecha:new Date().toISOString().slice(0,10),inicio:null,fin:null};
  state.controles.unshift(c);saveData();closeModal();
}
function submitLote(){
  var prod=gv('mprod'),vol=gv('mvol');if(!prod||!vol)return;
  var l={id:'LOT-'+new Date().getFullYear()+'-'+(100+state.lotes.length+1),producto:prod,volumen:Number(vol),graduacion:Number(gv('mgrad2'))||0,origen:gv('morig2'),estado:'Recepción',fecha:new Date().toISOString().slice(0,10),checkpoints:['recepcion']};
  state.lotes.unshift(l);saveData();closeModal();
}
function submitVenta(){
  var cli=gv('mcli'),vprod=gv('mvprod'),cant=gv('mcant');if(!cli||!vprod||!cant)return;
  var v={id:'VTA-'+(100+state.ventas.length+1).toString().padStart(3,'0'),cliente:cli,producto:vprod,cantidad:Number(cant),precio:Number(gv('mprec'))||0,fecha:new Date().toISOString().slice(0,10),estado:'Pendiente'};
  state.ventas.unshift(v);saveData();closeModal();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
